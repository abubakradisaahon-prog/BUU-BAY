<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>BUU-BAY | AI Marketplace</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,Helvetica,sans-serif;
}

body{
background:#f4f7fb;
color:#222;
}

nav{
background:#0f172a;
padding:18px 8%;
display:flex;
justify-content:space-between;
align-items:center;
}

.logo{
color:white;
font-size:28px;
font-weight:bold;
}

.logo span{
color:#38bdf8;
}

nav ul{
display:flex;
list-style:none;
gap:30px;
}

nav a{
color:white;
text-decoration:none;
font-weight:bold;
transition:.3s;
}

nav a:hover{
color:#38bdf8;
}

.hero{
padding:100px 8%;
background:linear-gradient(135deg,#0f172a,#1d4ed8);
color:white;
text-align:center;
}

.hero h1{
font-size:56px;
margin-bottom:20px;
}

.hero p{
font-size:22px;
max-width:700px;
margin:auto;
margin-bottom:35px;
}

.btn{
display:inline-block;
padding:15px 35px;
background:#38bdf8;
color:white;
text-decoration:none;
border-radius:8px;
font-weight:bold;
transition:.3s;
}

.btn:hover{
background:#0ea5e9;
}

.search-box{
margin-top:40px;
}

.search-box input{
width:60%;
padding:18px;
border:none;
border-radius:10px;
font-size:18px;
}

section{
padding:70px 8%;
}

.title{
text-align:center;
font-size:38px;
margin-bottom:50px;
}

.cards{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:25px;
}
